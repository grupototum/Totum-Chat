# Totum-Chat (LobeHub) — adicionado em 2026-05-03

map $http_upgrade $totum_chat_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 187.127.4.140:80;
    listen [::]:80;
    server_name chat.grupototum.com;
    return 301 https://$host$request_uri;
}

server {
    listen 187.127.4.140:443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name chat.grupototum.com;

    ssl_certificate     /etc/letsencrypt/live/chat.grupototum.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.grupototum.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $totum_chat_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
